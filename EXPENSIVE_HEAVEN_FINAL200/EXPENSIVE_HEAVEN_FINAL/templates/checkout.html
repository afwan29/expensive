
<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script>
function showPaymentNote(){
var pay=document.getElementById("payment").value;
var note=document.getElementById("bkashBox");

if(pay=="bKash/Nagad"){
note.style.display="block";
}else{
note.style.display="none";
}
}
</script>
</head>
<body class="bg-light">

<div class="container py-5">
<div class="row">

<div class="col-md-7">

<div class="card p-4 shadow">

<h2>{{ product.name }}</h2>

<form method="POST">

<input class="form-control mb-3" name="customer" placeholder="Full Name" required>

<input class="form-control mb-3" name="phone" placeholder="Phone Number" required>

<textarea class="form-control mb-3" name="address" placeholder="Address" required></textarea>

<textarea class="form-control mb-3" name="custom_text" placeholder="যেই কাস্টমাইজ লিখাটি দিতে চান, সেটি এখানে লিখে দিন"></textarea>

<input class="form-control mb-3" name="custom_image" placeholder="Image Upload Link / Demo Image URL">

<select class="form-select mb-3" name="payment" id="payment" onchange="showPaymentNote()">
<option>Cash On Delivery</option>
<option>AFWAN PAY</option>
<option>bKash/Nagad</option>
</select>

<div id="bkashBox" style="display:none" class="alert alert-warning">

<h5>অর্ডার কনফার্ম করতে ডেলিভারি চার্জ অগ্রীম প্রদান করতে হবে।</h5>

<p>(ডেলিভারি চার্জ ঢাকার ভেতর ৭০৳ এবং বাহিরে ১৩০৳)</p>

<div class="d-flex gap-3 align-items-center">
<img src="https://download.logo.wine/logo/BKash/BKash-Logo.wine.png" height="40">
<img src="https://download.logo.wine/logo/Nagad/Nagad-Logo.wine.png" height="40">
</div>

<h5 class="mt-3">01761030961 (Send Money)</h5>

<input class="form-control mt-3" name="trxid" placeholder="TrxID/Number(Used for Payment)">

</div>

<button class="btn btn-primary w-100">
Confirm Order
</button>

</form>

</div>

</div>

<div class="col-md-5">

<div class="card p-4 shadow">
<img src="{{ product.image }}" class="img-fluid rounded mb-3">
<h3>{{ product.name }}</h3>
<h2 class="text-primary">৳ {{ product.price }}</h2>
</div>

</div>

</div>
</div>

</body>
</html>
